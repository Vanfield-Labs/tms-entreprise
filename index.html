<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMS — Transport Management System</title>

    <!-- ── PWA manifest ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Apple PWA meta tags ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TMS Portal" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!--
      ── Theme pre-apply script ──────────────────────────────────────────────
      Runs BEFORE React renders to prevent flash of wrong theme.
      Reads localStorage("tms-theme") first, then system preference.
      MUST be inline here — do not move to an external file.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("tms-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = saved === "dark" || (!saved && prefersDark);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <!--
      ── Service Worker registration ─────────────────────────────────────────
      Inline here so it registers as early as possible.
    -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").then(function (reg) {
            console.log("[TMS] SW registered:", reg.scope);
          }).catch(function (err) {
            console.warn("[TMS] SW registration failed:", err);
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
