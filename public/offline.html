<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMS Portal — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f1117;
        font-family: 'IBM Plex Sans', system-ui, sans-serif;
        color: #e2e8f0;
        padding: 24px;
      }
      .card {
        background: #181c27;
        border: 1px solid #2a3045;
        border-radius: 20px;
        padding: 40px 32px;
        max-width: 380px;
        width: 100%;
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        background: rgba(217,119,6,0.15);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 28px;
      }
      h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
      p { font-size: 14px; color: #8896b0; line-height: 1.6; margin-bottom: 24px; }
      button {
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
      button:hover { filter: brightness(1.1); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📡</div>
      <h1>You're Offline</h1>
      <p>TMS Portal requires an internet connection. Please check your network and try again.</p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
